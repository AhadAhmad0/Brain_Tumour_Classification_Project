<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Classification</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            color: #222;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            padding: 30px;
            margin-bottom: 25px;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-section {
            text-align: center;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        .preview-box {
            margin-top: 20px;
            text-align: center;
        }

        .preview-box img {
            max-width: 320px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #ddd;
            display: none;
            margin: 0 auto 20px;
        }

        button {
            background: #1877f2;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #125fbe;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        #subResult {
            margin-top: 10px;
            font-size: 16px;
            text-align: center;
            color: #444;
        }

        .performance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .metric-box {
            background: #f9fbff;
            border-left: 5px solid #1877f2;
            padding: 20px;
            border-radius: 12px;
        }

        .metric-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: #1877f2;
        }

        .note {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .error-text {
            color: red;
        }

        .success-text {
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Brain Tumor Classification</h1>

            <div class="upload-section">
                <input type="file" id="imageInput" accept=".png,.jpg,.jpeg" onchange="previewImage(event)">
                <div class="preview-box">
                    <img id="preview" alt="Image Preview">
                </div>
                <button onclick="predictImage()">Predict</button>

                <div id="result"></div>
                <div id="subResult"></div>

                <p class="note">Supported image formats: PNG, JPG, JPEG</p>
            </div>
        </div>

        <div class="card">
            <h2>Model Performance</h2>
            <div class="performance-grid">
                <div class="metric-box">
                    <div class="metric-title">Training Accuracy</div>
                    <div class="metric-value">96.5%</div>
                </div>

                <div class="metric-box">
                    <div class="metric-title">Validation Accuracy</div>
                    <div class="metric-value">94.8%</div>
                </div>

                <div class="metric-box">
                    <div class="metric-title">Model Type</div>
                    <div class="metric-value" style="font-size:22px;">MobileNetV2</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById("preview");
            const file = event.target.files[0];

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            } else {
                preview.src = "";
                preview.style.display = "none";
            }

            document.getElementById("result").innerHTML = "";
            document.getElementById("subResult").innerHTML = "";
        }

        async function predictImage() {
            const fileInput = document.getElementById("imageInput");
            const resultBox = document.getElementById("result");
            const subResultBox = document.getElementById("subResult");

            resultBox.innerHTML = "";
            subResultBox.innerHTML = "";

            if (!fileInput.files || fileInput.files.length === 0) {
                resultBox.innerHTML = '<span class="error-text">Please upload an image first.</span>';
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);

            resultBox.innerHTML = "Predicting...";
            subResultBox.innerHTML = "";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    resultBox.innerHTML = '<span class="error-text">Error while connecting to server.</span>';
                    subResultBox.innerHTML = <span class="error-text">${data.error || "Unknown error occurred."}</span>;
                    return;
                }

                resultBox.innerHTML = <span class="success-text">Prediction: ${data.prediction}</span>;
                subResultBox.innerHTML = Confidence: ${data.confidence}%;
            } catch (error) {
                resultBox.innerHTML = '<span class="error-text">Error while connecting to server.</span>';
                subResultBox.innerHTML = <span class="error-text">${error.message}</span>;
            }
        }
    </script>
</body>
</html>
